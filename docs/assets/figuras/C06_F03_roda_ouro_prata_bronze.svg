  <circle cx="500" cy="310" r="155" fill="none" stroke="#667788" stroke-width="3"/><circle cx="500" cy="155" r="35" fill="#dcecf7" stroke="#18202a" stroke-width="2"/><text x="500" y="161" font-family="Arial, Helvetica, sans-serif" font-size="18" text-anchor="middle" font-weight="700" fill="#18202a">ouro (1)</text><circle cx="634.233937586588" cy="387.5" r="35" fill="#dcecf7" stroke="#18202a" stroke-width="2"/><text x="634.233937586588" y="393.5" font-family="Arial, Helvetica, sans-serif" font-size="18" text-anchor="middle" font-weight="700" fill="#18202a">prata (2)</text><circle cx="365.76606241341204" cy="387.50000000000006" r="35" fill="#dcecf7" stroke="#18202a" stroke-width="2"/><text x="365.76606241341204" y="393.50000000000006" font-family="Arial, Helvetica, sans-serif" font-size="18" text-anchor="middle" font-weight="700" fill="#18202a">bronze (0)</text><text x="500" y="525" font-family="Arial, Helvetica, sans-serif" font-size="16" text-anchor="middle" font-weight="400" fill="#18202a">A volta completa retorna ao início.</text>
