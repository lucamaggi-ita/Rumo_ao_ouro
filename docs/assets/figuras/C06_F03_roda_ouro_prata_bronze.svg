<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="620" viewBox="0 0 1000 620" role="img" aria-labelledby="title desc">
  <title id="title">Ciclo ouro, prata e bronze</title><desc id="desc">Uso: posições cíclicas; mantém o resto 0 visível na última posição.</desc>
