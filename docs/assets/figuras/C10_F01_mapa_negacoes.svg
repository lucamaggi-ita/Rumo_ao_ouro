<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="620" viewBox="0 0 1000 620" role="img" aria-labelledby="title desc">
  <title id="title">Mapa de negações precisas</title><desc id="desc">Uso: lógica; liga cada frase à negação e preserva os dois lados de exatamente.</desc>
  <rect width="1000" height="620" fill="#ffffff"/>
  <text x="50" y="52" font-family="Arial, Helvetica, sans-serif" font-size="27" text-anchor="start" font-weight="700" fill="#18202a">Mapa de negações precisas</text>
  <line x1="50" y1="72" x2="950" y2="72" stroke="#7a8a99" stroke-width="1" />
  <rect x="70" y="250" width="145" height="76" rx="4" fill="#f6f8fa" stroke="#18202a" stroke-width="2"/><text x="142.5" y="284" font-family="Arial, Helvetica, sans-serif" font-size="17" text-anchor="middle" font-weight="700" fill="#18202a">todos -&gt; existe um que não</text><line x1="215" y1="288" x2="335.3333333333333" y2="288" stroke="#506070" stroke-width="2" /><path d="M 327.3333333333333 283 L 335.3333333333333 288 L 327.3333333333333 293" fill="none" stroke="#506070" stroke-width="2"/><rect x="353.3333333333333" y="250" width="145" height="76" rx="4" fill="#f6f8fa" stroke="#18202a" stroke-width="2"/><text x="425.8333333333333" y="284" font-family="Arial, Helvetica, sans-serif" font-size="17" text-anchor="middle" font-weight="700" fill="#18202a">exatamente um -&gt; nenhum ou pelo menos dois</text><line x1="498.3333333333333" y1="288" x2="618.6666666666666" y2="288" stroke="#506070" stroke-width="2" /><path d="M 610.6666666666666 283 L 618.6666666666666 288 L 610.6666666666666 293" fill="none" stroke="#506070" stroke-width="2"/><rect x="636.6666666666666" y="250" width="145" height="76" rx="4" fill="#f6f8fa" stroke="#18202a" stroke-width="2"/><text x="709.1666666666666" y="284" font-family="Arial, Helvetica, sans-serif" font-size="17" text-anchor="middle" font-weight="700" fill="#18202a">algum -&gt; nenhum</text>
  <text x="50" y="590" font-family="Arial, Helvetica, sans-serif" font-size="14" text-anchor="start" font-weight="400" fill="#18202a">Uso: lógica; liga cada frase à negação e preserva os dois lados de exatamente.</text>
  </svg>