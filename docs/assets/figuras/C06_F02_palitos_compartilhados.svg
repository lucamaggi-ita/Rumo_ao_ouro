<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="620" viewBox="0 0 1000 620" role="img" aria-labelledby="title desc">
  <title id="title">Quadrados em fila feitos com palitos</title><desc id="desc">Uso: padrões com palitos; destaca o lado compartilhado e o acréscimo de três palitos.</desc>
  <rect width="1000" height="620" fill="#ffffff"/>
  <text x="50" y="52" font-family="Arial, Helvetica, sans-serif" font-size="27" text-anchor="start" font-weight="700" fill="#18202a">Quadrados em fila feitos com palitos</text>
  <line x1="50" y1="72" x2="950" y2="72" stroke="#7a8a99" stroke-width="1" />
  <rect x="105" y="230" width="55" height="55" rx="0" fill="#ffffff" stroke="#18202a" stroke-width="3"/><text x="132" y="330" font-family="Arial, Helvetica, sans-serif" font-size="17" text-anchor="middle" font-weight="700" fill="#18202a">1 placa</text><rect x="390" y="230" width="55" height="55" rx="0" fill="#ffffff" stroke="#18202a" stroke-width="3"/><rect x="445" y="230" width="55" height="55" rx="0" fill="#ffffff" stroke="#18202a" stroke-width="3"/><line x1="445" y1="230" x2="445" y2="285" stroke="#2c7a7b" stroke-width="6" /><text x="444" y="330" font-family="Arial, Helvetica, sans-serif" font-size="17" text-anchor="middle" font-weight="700" fill="#18202a">2 placas</text><rect x="675" y="230" width="55" height="55" rx="0" fill="#ffffff" stroke="#18202a" stroke-width="3"/><rect x="730" y="230" width="55" height="55" rx="0" fill="#ffffff" stroke="#18202a" stroke-width="3"/><rect x="785" y="230" width="55" height="55" rx="0" fill="#ffffff" stroke="#18202a" stroke-width="3"/><line x1="730" y1="230" x2="730" y2="285" stroke="#2c7a7b" stroke-width="6" /><text x="756" y="330" font-family="Arial, Helvetica, sans-serif" font-size="17" text-anchor="middle" font-weight="700" fill="#18202a">3 placas</text>
  <text x="50" y="590" font-family="Arial, Helvetica, sans-serif" font-size="14" text-anchor="start" font-weight="400" fill="#18202a">Uso: padrões com palitos; destaca o lado compartilhado e o acréscimo de três palitos.</text>
