  <rect x="55" y="135" width="445" height="72" rx="4" fill="#dcecf7" stroke="#18202a" stroke-width="2"/><text x="277.5" y="177" font-family="Arial, Helvetica, sans-serif" font-size="16" text-anchor="middle" font-weight="700" fill="#18202a">Repartir sem sobra</text><rect x="500" y="135" width="445" height="72" rx="4" fill="#dcecf7" stroke="#18202a" stroke-width="2"/><text x="722.5" y="177" font-family="Arial, Helvetica, sans-serif" font-size="16" text-anchor="middle" font-weight="700" fill="#18202a">Reencontrar ciclos</text><rect x="55" y="207" width="445" height="72" rx="4" fill="#ffffff" stroke="#18202a" stroke-width="2"/><text x="67" y="249" font-family="Arial, Helvetica, sans-serif" font-size="14" text-anchor="start" font-weight="700" fill="#18202a">kits, grupos, cortes</text><rect x="500" y="207" width="445" height="72" rx="4" fill="#ffffff" stroke="#18202a" stroke-width="2"/><text x="512" y="249" font-family="Arial, Helvetica, sans-serif" font-size="14" text-anchor="start" font-weight="400" fill="#18202a">sinais, relógios, voltas</text><rect x="55" y="279" width="445" height="72" rx="4" fill="#ffffff" stroke="#18202a" stroke-width="2"/><text x="67" y="321" font-family="Arial, Helvetica, sans-serif" font-size="14" text-anchor="start" font-weight="700" fill="#18202a">maior divisor comum</text><rect x="500" y="279" width="445" height="72" rx="4" fill="#ffffff" stroke="#18202a" stroke-width="2"/><text x="512" y="321" font-family="Arial, Helvetica, sans-serif" font-size="14" text-anchor="start" font-weight="400" fill="#18202a">primeiro múltiplo comum</text>
