<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="620" viewBox="0 0 1000 620" role="img" aria-labelledby="title desc">
  <title id="title">Repartir sem sobra ou reencontrar ciclos</title><desc id="desc">Uso: comparação MDC/MMC; organiza as palavras-sinal já explicadas.</desc>
