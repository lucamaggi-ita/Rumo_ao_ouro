<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="620" viewBox="0 0 1000 620" role="img" aria-labelledby="title desc">
  <title id="title">Roda do preparo</title><desc id="desc">Uso: alterna revisão, treino-alvo, escrita, correção, simulado e descanso sem início obrigatório.</desc>
  <rect width="1000" height="620" fill="#ffffff"/>
  <text x="50" y="52" font-family="Arial, Helvetica, sans-serif" font-size="27" text-anchor="start" font-weight="700" fill="#18202a">Roda do preparo</text>
  <line x1="50" y1="72" x2="950" y2="72" stroke="#7a8a99" stroke-width="1" />
  <circle cx="500" cy="310" r="155" fill="none" stroke="#667788" stroke-width="3"/><circle cx="500" cy="155" r="35" fill="#dcecf7" stroke="#18202a" stroke-width="2"/><text x="500" y="161" font-family="Arial, Helvetica, sans-serif" font-size="18" text-anchor="middle" font-weight="700" fill="#18202a">revisão</text><circle cx="634.233937586588" cy="232.5" r="35" fill="#dcecf7" stroke="#18202a" stroke-width="2"/><text x="634.233937586588" y="238.5" font-family="Arial, Helvetica, sans-serif" font-size="18" text-anchor="middle" font-weight="700" fill="#18202a">treino-alvo</text><circle cx="634.233937586588" cy="387.5" r="35" fill="#dcecf7" stroke="#18202a" stroke-width="2"/><text x="634.233937586588" y="393.5" font-family="Arial, Helvetica, sans-serif" font-size="18" text-anchor="middle" font-weight="700" fill="#18202a">escrita</text><circle cx="500" cy="465" r="35" fill="#dcecf7" stroke="#18202a" stroke-width="2"/><text x="500" y="471" font-family="Arial, Helvetica, sans-serif" font-size="18" text-anchor="middle" font-weight="700" fill="#18202a">correção</text><circle cx="365.76606241341204" cy="387.50000000000006" r="35" fill="#dcecf7" stroke="#18202a" stroke-width="2"/><text x="365.76606241341204" y="393.50000000000006" font-family="Arial, Helvetica, sans-serif" font-size="18" text-anchor="middle" font-weight="700" fill="#18202a">simulado</text><circle cx="365.766062413412" cy="232.5" r="35" fill="#dcecf7" stroke="#18202a" stroke-width="2"/><text x="365.766062413412" y="238.5" font-family="Arial, Helvetica, sans-serif" font-size="18" text-anchor="middle" font-weight="700" fill="#18202a">descanso</text><text x="500" y="525" font-family="Arial, Helvetica, sans-serif" font-size="16" text-anchor="middle" font-weight="400" fill="#18202a">A volta completa retorna ao início.</text>
