<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="620" viewBox="0 0 1000 620" role="img" aria-labelledby="title desc">
  <title id="title">Ciclo de restos por 4</title><desc id="desc">Uso: seção de restos; mostra a repetição 0, 1, 2, 3 sem estender os dados.</desc>
  <rect width="1000" height="620" fill="#ffffff"/>
  <text x="50" y="52" font-family="Arial, Helvetica, sans-serif" font-size="27" text-anchor="start" font-weight="700" fill="#18202a">Ciclo de restos por 4</text>
  <line x1="50" y1="72" x2="950" y2="72" stroke="#7a8a99" stroke-width="1" />
  <circle cx="500" cy="310" r="155" fill="none" stroke="#667788" stroke-width="3"/><circle cx="500" cy="155" r="35" fill="#dcecf7" stroke="#18202a" stroke-width="2"/><text x="500" y="161" font-family="Arial, Helvetica, sans-serif" font-size="18" text-anchor="middle" font-weight="700" fill="#18202a">0</text><circle cx="655" cy="310" r="35" fill="#dcecf7" stroke="#18202a" stroke-width="2"/><text x="655" y="316" font-family="Arial, Helvetica, sans-serif" font-size="18" text-anchor="middle" font-weight="700" fill="#18202a">1</text><circle cx="500" cy="465" r="35" fill="#dcecf7" stroke="#18202a" stroke-width="2"/><text x="500" y="471" font-family="Arial, Helvetica, sans-serif" font-size="18" text-anchor="middle" font-weight="700" fill="#18202a">2</text><circle cx="345" cy="310" r="35" fill="#dcecf7" stroke="#18202a" stroke-width="2"/><text x="345" y="316" font-family="Arial, Helvetica, sans-serif" font-size="18" text-anchor="middle" font-weight="700" fill="#18202a">3</text><text x="500" y="525" font-family="Arial, Helvetica, sans-serif" font-size="16" text-anchor="middle" font-weight="400" fill="#18202a">A volta completa retorna ao início.</text>
  <text x="50" y="590" font-family="Arial, Helvetica, sans-serif" font-size="14" text-anchor="start" font-weight="400" fill="#18202a">Uso: seção de restos; mostra a repetição 0, 1, 2, 3 sem estender os dados.</text>
  </svg>