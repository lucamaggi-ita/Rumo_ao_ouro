<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="620" viewBox="0 0 1000 620" role="img" aria-labelledby="title desc">
  <title id="title">Matriz das quatro zonas</title><desc id="desc">Uso: priorização; fortes, médias, fragilidades necessárias e conteúdos perigosos.</desc>
  <rect width="1000" height="620" fill="#ffffff"/>
  <text x="50" y="52" font-family="Arial, Helvetica, sans-serif" font-size="27" text-anchor="start" font-weight="700" fill="#18202a">Matriz das quatro zonas</text>
  <line x1="50" y1="72" x2="950" y2="72" stroke="#7a8a99" stroke-width="1" />
  <rect x="55" y="135" width="222.5" height="72" rx="4" fill="#dcecf7" stroke="#18202a" stroke-width="2"/><text x="166.25" y="177" font-family="Arial, Helvetica, sans-serif" font-size="16" text-anchor="middle" font-weight="700" fill="#18202a">Forte</text><rect x="277.5" y="135" width="222.5" height="72" rx="4" fill="#dcecf7" stroke="#18202a" stroke-width="2"/><text x="388.75" y="177" font-family="Arial, Helvetica, sans-serif" font-size="16" text-anchor="middle" font-weight="700" fill="#18202a">Média</text><rect x="500" y="135" width="222.5" height="72" rx="4" fill="#dcecf7" stroke="#18202a" stroke-width="2"/><text x="611.25" y="177" font-family="Arial, Helvetica, sans-serif" font-size="16" text-anchor="middle" font-weight="700" fill="#18202a">Fragilidade necessária</text><rect x="722.5" y="135" width="222.5" height="72" rx="4" fill="#dcecf7" stroke="#18202a" stroke-width="2"/><text x="833.75" y="177" font-family="Arial, Helvetica, sans-serif" font-size="16" text-anchor="middle" font-weight="700" fill="#18202a">Perigoso agora</text><rect x="55" y="207" width="222.5" height="72" rx="4" fill="#ffffff" stroke="#18202a" stroke-width="2"/><text x="67" y="249" font-family="Arial, Helvetica, sans-serif" font-size="14" text-anchor="start" font-weight="700" fill="#18202a">consolidar</text><rect x="277.5" y="207" width="222.5" height="72" rx="4" fill="#ffffff" stroke="#18202a" stroke-width="2"/><text x="289.5" y="249" font-family="Arial, Helvetica, sans-serif" font-size="14" text-anchor="start" font-weight="400" fill="#18202a">treinar</text><rect x="500" y="207" width="222.5" height="72" rx="4" fill="#ffffff" stroke="#18202a" stroke-width="2"/><text x="512" y="249" font-family="Arial, Helvetica, sans-serif" font-size="14" text-anchor="start" font-weight="400" fill="#18202a">priorizar</text><rect x="722.5" y="207" width="222.5" height="72" rx="4" fill="#ffffff" stroke="#18202a" stroke-width="2"/><text x="734.5" y="249" font-family="Arial, Helvetica, sans-serif" font-size="14" text-anchor="start" font-weight="400" fill="#18202a">não abrir</text>
  <text x="50" y="590" font-family="Arial, Helvetica, sans-serif" font-size="14" text-anchor="start" font-weight="400" fill="#18202a">Uso: priorização; fortes, médias, fragilidades necessárias e conteúdos perigosos.</text>
