<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="620" viewBox="0 0 1000 620" role="img" aria-labelledby="title desc">
  <title id="title">Fração do total e razão entre partes</title><desc id="desc">Uso: evita a troca de leitura entre parte-todo e comparação de partes.</desc>
  <rect width="1000" height="620" fill="#ffffff"/>
  <text x="50" y="52" font-family="Arial, Helvetica, sans-serif" font-size="27" text-anchor="start" font-weight="700" fill="#18202a">Fração do total e razão entre partes</text>
  <line x1="50" y1="72" x2="950" y2="72" stroke="#7a8a99" stroke-width="1" />
  <rect x="55" y="135" width="445" height="72" rx="4" fill="#dcecf7" stroke="#18202a" stroke-width="2"/><text x="277.5" y="177" font-family="Arial, Helvetica, sans-serif" font-size="16" text-anchor="middle" font-weight="700" fill="#18202a">Fração do total</text><rect x="500" y="135" width="445" height="72" rx="4" fill="#dcecf7" stroke="#18202a" stroke-width="2"/><text x="722.5" y="177" font-family="Arial, Helvetica, sans-serif" font-size="16" text-anchor="middle" font-weight="700" fill="#18202a">Razão entre partes</text><rect x="55" y="207" width="445" height="72" rx="4" fill="#ffffff" stroke="#18202a" stroke-width="2"/><text x="67" y="249" font-family="Arial, Helvetica, sans-serif" font-size="14" text-anchor="start" font-weight="700" fill="#18202a">tem inteiro de referência</text><rect x="500" y="207" width="445" height="72" rx="4" fill="#ffffff" stroke="#18202a" stroke-width="2"/><text x="512" y="249" font-family="Arial, Helvetica, sans-serif" font-size="14" text-anchor="start" font-weight="400" fill="#18202a">compara duas partes</text><rect x="55" y="279" width="445" height="72" rx="4" fill="#ffffff" stroke="#18202a" stroke-width="2"/><text x="67" y="321" font-family="Arial, Helvetica, sans-serif" font-size="14" text-anchor="start" font-weight="700" fill="#18202a">parte / total</text><rect x="500" y="279" width="445" height="72" rx="4" fill="#ffffff" stroke="#18202a" stroke-width="2"/><text x="512" y="321" font-family="Arial, Helvetica, sans-serif" font-size="14" text-anchor="start" font-weight="400" fill="#18202a">parte : parte</text>
  <text x="50" y="590" font-family="Arial, Helvetica, sans-serif" font-size="14" text-anchor="start" font-weight="400" fill="#18202a">Uso: evita a troca de leitura entre parte-todo e comparação de partes.</text>
  </svg>